name: matcheck

networks:
  matcheck-net:
    driver: bridge

volumes:
  matcheck-redis-data:

services:
  matcheck-redis:
    image: redis:7-alpine
    container_name: matcheck-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "noeviction"]
    networks: [matcheck-net]
    volumes:
      - matcheck-redis-data:/data
    mem_limit: 160m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  matcheck-api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: matcheck-api
    restart: unless-stopped
    env_file:
      - /srv/matcheck/secrets/api.env
    networks: [matcheck-net]
    ports:
      - "127.0.0.1:13001:3001"
    volumes:
      - /srv/matcheck/secrets/yandex-ca/root.crt:/etc/ssl/yandex/root.crt:ro
    depends_on:
      matcheck-redis:
        condition: service_healthy
    mem_limit: 700m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  matcheck-worker:
    # Отдельный процесс распознавания УПД-PDF через LLM. Использует тот же
    # образ, что и API, но запускает src/worker.ts (BullMQ Worker). Изоляция
    # нужна, чтобы 5–10-минутные LLM-вызовы не блокировали event-loop API
    # и его HTTP healthcheck.
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: matcheck-matcheck-api
    container_name: matcheck-worker
    restart: unless-stopped
    env_file:
      - /srv/matcheck/secrets/api.env
    networks: [matcheck-net]
    volumes:
      - /srv/matcheck/secrets/yandex-ca/root.crt:/etc/ssl/yandex/root.crt:ro
    depends_on:
      matcheck-redis:
        condition: service_healthy
    mem_limit: 500m
    cpus: 1.0
    command: ["node_modules/.bin/tsx", "src/worker.ts"]
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  matcheck-web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: matcheck-web
    restart: unless-stopped
    networks: [matcheck-net]
    ports:
      - "127.0.0.1:18080:80"
    mem_limit: 96m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

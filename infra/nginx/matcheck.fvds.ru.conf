# matcheck.fvds.ru — ручной vhost для системного nginx VPS mosgate.fvds.ru.
#
# Размещение на сервере: /etc/nginx/sites-available/matcheck.fvds.ru
# с симлинком /etc/nginx/sites-enabled/matcheck.fvds.ru.
#
# ISPmanager этим файлом не управляет — мы намеренно держим его вне
# /etc/nginx/vhosts/, чтобы панель его не перетёрла при следующих правках.

upstream matcheck_api { server 127.0.0.1:13001; keepalive 16; }
upstream matcheck_web { server 127.0.0.1:18080; keepalive 16; }

# HTTP: ACME-challenge + редирект на HTTPS
server {
    listen 185.200.179.0:80;
    server_name matcheck.fvds.ru;

    access_log /var/log/nginx/matcheck.access.log;
    error_log  /var/log/nginx/matcheck.error.log;

    location /.well-known/acme-challenge/ {
        root /usr/local/mgr5/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: основной сайт
server {
    listen 185.200.179.0:443 ssl;
    http2 on;
    server_name matcheck.fvds.ru;

    ssl_certificate     /etc/letsencrypt/live/matcheck.fvds.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matcheck.fvds.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://s3.cloud.ru; connect-src 'self' https://s3.cloud.ru; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self' blob:; frame-src 'self' blob: https://s3.cloud.ru; manifest-src 'self'" always;

    access_log /var/log/nginx/matcheck.access.log;
    error_log  /var/log/nginx/matcheck.error.log warn;

    client_max_body_size 25m;

    # Префикс /api/v1 должен доходить до Fastify (роуты объявлены с ним).
    # БЕЗ trailing slash в proxy_pass!
    location /api/v1/ {
        proxy_pass http://matcheck_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # PWA service worker — без кеша, иначе обновления не доезжают.
    location = /sw.js {
        proxy_pass http://matcheck_web;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # SPA + статика (всё остальное).
    location / {
        proxy_pass http://matcheck_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

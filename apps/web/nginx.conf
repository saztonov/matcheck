server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css text/javascript application/javascript application/json image/svg+xml;
  gzip_vary on;

  # Долгое кеширование статики (vite пишет хэш в имя файла)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Service worker не кешируем
  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # index.html всегда свежий — иначе браузер закэширует HTML
  # со ссылками на старые JS-чанки, и обновление сайта не подхватится
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
    try_files $uri =404;
  }

  # Манифест PWA тоже без кэша, чтобы изменения подхватывались
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
